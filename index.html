<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Studio Pro - Vertical Edition</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 10px; }
        #preview-container { margin-bottom: 20px; background: #000; display: inline-block; border-radius: 12px; overflow: hidden; border: 3px solid #333; position: relative; width: 90%; max-width: 360px; }
        #live-preview { width: 100%; display: block; aspect-ratio: 9/16; object-fit: cover; }
        .controls { margin: 15px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        select, button, .btn-upload { padding: 10px; font-size: 13px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; background: #333; color: white; }
        #btn-start { background: #28a745; }
        #btn-stop { background: #dc3545; }
        #btn-flip { background: #555; }
        #btn-mix { background: #007bff; display: none; width: 100%; max-width: 300px; margin-top: 10px; }
        .btn-upload { background: #6f42c1; text-decoration: none; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #layers-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; max-width: 800px; margin: 20px auto; }
        .layer-card { background: #1e1e1e; padding: 10px; border-radius: 10px; border: 1px solid #333; position: relative; }
        .layer-card video { width: 100%; border-radius: 4px; aspect-ratio: 9/16; object-fit: cover; }
        .btn-delete { position: absolute; top: -5px; right: -5px; background: #dc3545; color: white; border-radius: 50%; width: 22px; height: 22px; border: none; cursor: pointer; z-index: 10; }
        #status-msg { color: #f39c12; font-weight: bold; margin-top: 10px; font-size: 14px; }
        .setup-bar { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Guitar Studio Pro</h1>
   
    <div class="setup-bar">
        <select id="audio-source"></select>
        <button id="btn-flip">Inverter 🔄</button>
    </div>

    <div id="preview-container">
        <video id="live-preview" autoplay muted playsinline></video>
    </div>

    <div class="controls">
        <button id="btn-start">Gravar</button>
        <button id="btn-stop" disabled>Parar</button>
        <label for="file-upload" class="btn-upload">Upload</label>
        <input type="file" id="file-upload" accept="video/*" style="display:none">
        <button id="btn-mix">Gerar Vídeo Vertical (Reels/TikTok)</button>
    </div>
   
    <div id="status-msg">Pronto para gravar...</div>
    <div id="layers-container"></div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true, corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js' });

        let mediaRecorder, recordedChunks = [], layerBlobs = [], layerVolumes = [];
        let currentStream, currentFacingMode = 'user';
       
        const livePreview = document.getElementById('live-preview');
        const audioSelect = document.getElementById('audio-source');
        const statusMsg = document.getElementById('status-msg');
        const btnMix = document.getElementById('btn-mix');

        async function getDevices() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                audioSelect.innerHTML = '';
                devices.filter(d => d.kind === 'audioinput').forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.deviceId;
                    opt.text = d.label || `Entrada ${audioSelect.length + 1}`;
                    audioSelect.appendChild(opt);
                });
            } catch (e) { console.error(e); }
        }

        async function initStream() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            const constraints = {
                video: { facingMode: currentFacingMode, width: 1080, height: 1920 },
                audio: { deviceId: audioSelect.value ? { exact: audioSelect.value } : undefined, echoCancellation: false, noiseSuppression: false, autoGainControl: false }
            };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                livePreview.srcObject = stream;
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => { addLayer(new Blob(recordedChunks, {type:'video/webm'})); recordedChunks = []; };
                if(audioSelect.options.length <= 1) await getDevices();
            } catch (err) { statusMsg.innerText = "Câmera indisponível."; }
        }

        document.getElementById('file-upload').addEventListener('change', function(e) {
            if (e.target.files[0]) { addLayer(e.target.files[0]); this.value = ''; }
        });

        function addLayer(blob) {
            layerBlobs.push(blob);
            layerVolumes.push(1);
            renderLayers();
        }

        function removeLayer(index) {
            layerBlobs.splice(index, 1);
            layerVolumes.splice(index, 1);
            renderLayers();
        }

        function renderLayers() {
            const container = document.getElementById('layers-container');
            container.innerHTML = '';
            layerBlobs.forEach((blob, i) => {
                const card = document.createElement('div');
                card.className = 'layer-card';
                card.innerHTML = `
                    <button class="btn-delete" onclick="removeLayer(${i})">X</button>
                    <video src="${URL.createObjectURL(blob)}" controls></video>
                    <label style="display:block;margin-top:5px;font-size:11px">Volume: ${Math.round(layerVolumes[i]*100)}%</label>
                    <input type="range" min="0" max="2" step="0.1" value="${layerVolumes[i]}" oninput="updateVol(${i}, this)" style="width:100%">
                `;
                container.appendChild(card);
            });
            btnMix.style.display = layerBlobs.length >= 2 ? "inline-block" : "none";
        }

        window.updateVol = (i, el) => { layerVolumes[i] = el.value; el.previousElementSibling.innerText = `Volume: ${Math.round(el.value*100)}%`; };

        audioSelect.onchange = initStream;
        document.getElementById('btn-flip').onclick = () => {
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            initStream();
        };

        navigator.mediaDevices.getUserMedia({ audio: true, video: true }).then(() => getDevices().then(initStream));

        document.getElementById('btn-start').onclick = () => {
            document.querySelectorAll('video').forEach(v => { if(v.id !== 'live-preview') { v.currentTime = 0; v.play(); } });
            if(mediaRecorder) mediaRecorder.start();
            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-stop').disabled = false;
            statusMsg.innerText = "Gravando...";
        };

        document.getElementById('btn-stop').onclick = () => {
            if(mediaRecorder) mediaRecorder.stop();
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-stop').disabled = true;
            statusMsg.innerText = "Processando camada...";
        };

        btnMix.onclick = async () => {
            btnMix.disabled = true;
            statusMsg.innerText = "Renderizando Vertical (HD)...";
            if (!ffmpeg.isLoaded()) await ffmpeg.load();
           
            const num = layerBlobs.length;
            let filter = "";
            let inputs = [];
           
            // Altura de cada pedaço do vídeo para caber no 1920 total
            const segmentHeight = Math.floor(1920 / num);

            for (let i = 0; i < num; i++) {
                const name = `in${i}.webm`;
                ffmpeg.FS('writeFile', name, await fetchFile(layerBlobs[i]));
                inputs.push("-i", name);
                // Redimensiona para cobrir 1080 de largura e corta para a altura proporcional
                filter += `[${i}:v]scale=1080:-1,crop=1080:${segmentHeight},setpts=PTS-STARTPTS[v${i}]; [${i}:a]volume=${layerVolumes[i]}[a${i}];`;
            }

            let vMap = ""; for(let i=0; i<num; i++) vMap += `[v${i}]`;
            let aLabels = ""; for(let i=0; i<num; i++) aLabels += `[a${i}]`;

            const fullFilter = `${filter}${vMap}vstack=inputs=${num}[v];${aLabels}amix=inputs=${num}:duration=longest[a]`;

            try {
                await ffmpeg.run(...inputs, "-filter_complex", fullFilter, "-map", "[v]", "-map", "[a]", "-c:v", "libx264", "-c:a", "aac", "-pix_fmt", "yuv420p", "-r", "30", "-movflags", "+faststart", "-preset", "ultrafast", "social.mp4");
                const data = ffmpeg.FS('readFile', 'social.mp4');
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                link.download = `reels_guitar_${Date.now()}.mp4`;
                link.click();
                statusMsg.innerText = "Vídeo gerado para Redes Sociais!";
            } catch (e) { statusMsg.innerText = "Erro na renderização."; } finally { btnMix.disabled = false; }
        };
    </script>
</body>
</html>
