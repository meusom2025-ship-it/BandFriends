<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Studio Pro - Final Fix</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 10px; margin: 0; }
        #preview-container { margin: 10px auto; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #333; width: 260px; height: 462px; position: relative; }
        #live-preview { width: 100%; height: 100%; object-fit: cover; }
        .controls { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 10px; }
        button, .btn-upload { padding: 12px; font-size: 14px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; background: #333; color: white; }
        #btn-start { background: #28a745; }
        #btn-stop { background: #dc3545; }
        #btn-mix { background: #007bff; display: none; width: 90%; margin: 10px auto; }
        #download-link { display: none; background: #ffc107; color: #000; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 90%; margin: 10px auto; }
        #status-msg { color: #f39c12; font-size: 14px; margin: 10px; min-height: 1.5em; }
        #layers-container { display: flex; overflow-x: auto; gap: 10px; padding: 10px; }
        .layer-card { min-width: 100px; background: #1e1e1e; padding: 5px; border-radius: 8px; position: relative; }
        .layer-card video { width: 100%; border-radius: 4px; aspect-ratio: 9/16; object-fit: cover; }
    </style>
</head>
<body>

    <h2 style="font-size: 18px; margin: 10px 0;">Guitar Studio Pro</h2>
   
    <div id="preview-container">
        <video id="live-preview" autoplay muted playsinline></video>
    </div>

    <div id="status-msg">Iniciando câmera...</div>

    <div class="controls">
        <button id="btn-start">GRAVAR</button>
        <button id="btn-stop" disabled>PARAR</button>
        <label for="file-upload" class="btn-upload">UPLOAD</label>
        <input type="file" id="file-upload" accept="video/*" style="display:none">
    </div>

    <button id="btn-mix">MIXAR VÍDEO VERTICAL</button>
    <a id="download-link">⬇️ BAIXAR VÍDEO PRONTO</a>
   
    <div id="layers-container"></div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: false, corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js' });

        let mediaRecorder, recordedChunks = [], layerBlobs = [], layerVolumes = [];
        let currentStream;
       
        const livePreview = document.getElementById('live-preview');
        const statusMsg = document.getElementById('status-msg');
        const downloadLink = document.getElementById('download-link');

        async function initStream() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 720 } },
                    audio: { echoCancellation: false }
                });
                currentStream = stream;
                livePreview.srcObject = stream;
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => { addLayer(new Blob(recordedChunks, {type:'video/webm'})); recordedChunks = []; };
                statusMsg.innerText = "Pronto!";
            } catch (err) {
                statusMsg.innerText = "Erro na câmera. Verifique permissões.";
            }
        }

        document.getElementById('file-upload').onchange = (e) => { if(e.target.files[0]) addLayer(e.target.files[0]); };

        function addLayer(blob) {
            layerBlobs.push(blob);
            layerVolumes.push(1);
            renderLayers();
            statusMsg.innerText = "Camada adicionada!";
        }

        function renderLayers() {
            const container = document.getElementById('layers-container');
            container.innerHTML = '';
            layerBlobs.forEach((blob, i) => {
                const card = document.createElement('div');
                card.className = 'layer-card';
                card.innerHTML = `<video src="${URL.createObjectURL(blob)}" playsinline muted></video>`;
                container.appendChild(card);
            });
            document.getElementById('btn-mix').style.display = layerBlobs.length >= 2 ? "block" : "none";
        }

        window.onload = initStream;

        document.getElementById('btn-start').onclick = () => {
            document.querySelectorAll('.layer-card video').forEach(v => { v.currentTime = 0; v.play(); });
            mediaRecorder.start();
            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-stop').disabled = false;
            statusMsg.innerText = "Gravando...";
        };

        document.getElementById('btn-stop').onclick = () => {
            mediaRecorder.stop();
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-stop').disabled = true;
        };

        document.getElementById('btn-mix').onclick = async () => {
            const btn = document.getElementById('btn-mix');
            btn.style.display = "none";
            downloadLink.style.display = "none";
            statusMsg.innerText = "Mixando... Aguarde uns instantes.";
           
            if (!ffmpeg.isLoaded()) await ffmpeg.load();
           
            const num = layerBlobs.length;
            let filter = "";
            let inputs = [];
            const segH = Math.floor(960 / num); // Resolução otimizada para mobile

            for (let i = 0; i < num; i++) {
                const name = `i${i}.webm`;
                ffmpeg.FS('writeFile', name, await fetchFile(layerBlobs[i]));
                inputs.push("-i", name);
                filter += `[${i}:v]scale=540:-1,crop=540:${segH},setpts=PTS-STARTPTS[v${i}]; [${i}:a]volume=${layerVolumes[i]}[a${i}];`;
            }

            let vMap = ""; for(let i=0; i<num; i++) vMap += `[v${i}]`;
            let aLabels = ""; for(let i=0; i<num; i++) aLabels += `[a${i}]`;
            const fullFilter = `${filter}${vMap}vstack=inputs=${num}[v];${aLabels}amix=inputs=${num}:duration=longest[a]`;

            try {
                await ffmpeg.run(...inputs, "-filter_complex", fullFilter, "-map", "[v]", "-map", "[a]", "-c:v", "libx264", "-crf", "28", "-preset", "ultrafast", "out.mp4");
               
                const data = ffmpeg.FS('readFile', 'out.mp4');
                const blob = new Blob([data.buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
               
                downloadLink.href = url;
                downloadLink.download = "video_guitarra.mp4";
                downloadLink.style.display = "block";
                statusMsg.innerText = "Mixagem concluída!";
               
                // Limpeza
                for (let i = 0; i < num; i++) ffmpeg.FS('unlink', `i${i}.webm`);
                ffmpeg.FS('unlink', 'out.mp4');
            } catch (e) {
                statusMsg.innerText = "Erro. Tente com vídeos mais curtos.";
                btn.style.display = "block";
            }
        };
    </script>
</body>
</html>
