
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Studio Pro - GitHub Edition</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 20px; }
        #preview-container { margin-bottom: 20px; background: #000; display: inline-block; border-radius: 12px; overflow: hidden; border: 3px solid #333; }
        #live-preview { width: 100%; max-width: 480px; display: block; }
        .controls { margin: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button, .btn-upload { padding: 12px 24px; font-size: 14px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.3s; text-decoration: none; }
        #btn-start { background: #28a745; color: white; }
        #btn-stop { background: #dc3545; color: white; }
        #btn-mix { background: #007bff; color: white; display: none; }
        .btn-upload { background: #6f42c1; color: white; }
        button:disabled { background: #444 !important; cursor: not-allowed; opacity: 0.6; }
        #layers-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 30px; max-width: 1000px; margin: 30px auto; }
        .layer-card { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .layer-card video { width: 100%; border-radius: 4px; }
        input[type=range] { width: 100%; margin-top: 10px; }
        #status-msg { color: #f39c12; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Guitar Studio Pro</h1>
    <div id="preview-container"><video id="live-preview" autoplay muted playsinline></video></div>

    <div class="controls">
        <button id="btn-start">Gravar Camada</button>
        <button id="btn-stop" disabled>Parar</button>
        <label for="file-upload" class="btn-upload">Upload Vídeo</label>
        <input type="file" id="file-upload" accept="video/*" style="display:none">
        <button id="btn-mix">Mixar Camadas (MP4)</button>
    </div>
   
    <div id="status-msg"></div>
    <div id="layers-container"></div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        let mediaRecorder, recordedChunks = [], layerBlobs = [], layerVolumes = [];
        const livePreview = document.getElementById('live-preview'), layersContainer = document.getElementById('layers-container');
        const btnStart = document.getElementById('btn-start'), btnStop = document.getElementById('btn-stop'), btnMix = document.getElementById('btn-mix');
        const statusMsg = document.getElementById('status-msg');

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(s => {
            livePreview.srcObject = s;
            mediaRecorder = new MediaRecorder(s, { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => { addLayer(new Blob(recordedChunks, {type:'video/webm'})); recordedChunks = []; };
        });

        document.getElementById('file-upload').onchange = e => { if(e.target.files[0]) addLayer(e.target.files[0]); };

        function addLayer(blob) {
            layerBlobs.push(blob);
            const idx = layerBlobs.length - 1;
            layerVolumes[idx] = 1;
            const card = document.createElement('div');
            card.className = 'layer-card';
            card.innerHTML = `<video src="${URL.createObjectURL(blob)}" controls class="player"></video>
                              <label style="font-size:12px">Volume: 100%</label>
                              <input type="range" min="0" max="2" step="0.1" value="1" oninput="updateVol(${idx}, this)">`;
            layersContainer.appendChild(card);
            if(layerBlobs.length >= 2) btnMix.style.display = "inline-block";
        }

        window.updateVol = (i, el) => { layerVolumes[i] = el.value; el.previousElementSibling.innerText = `Volume: ${Math.round(el.value*100)}%`; };

        btnStart.onclick = () => {
            document.querySelectorAll('.player').forEach(p => { p.currentTime = 0; p.play(); });
            mediaRecorder.start();
            btnStart.disabled = true; btnStop.disabled = false;
            statusMsg.innerText = "Gravando...";
        };

        btnStop.onclick = () => {
            mediaRecorder.stop();
            document.querySelectorAll('.player').forEach(p => p.pause());
            btnStart.disabled = false; btnStop.disabled = true;
            statusMsg.innerText = "Camada adicionada.";
        };

        btnMix.onclick = async () => {
            btnMix.innerText = "Renderizando..."; btnMix.disabled = true;
            try {
                if (!ffmpeg.isLoaded()) await ffmpeg.load();
                let aFilter = "", aLabels = "", vInputs = "";
                for (let i = 0; i < layerBlobs.length; i++) {
                    ffmpeg.FS('writeFile', `i${i}`, await fetchFile(layerBlobs[i]));
                    vInputs += `[${i}:v]`;
                    aFilter += `[${i}:a]volume=${layerVolumes[i]}[a${i}];`;
                    aLabels += `[a${i}]`;
                }
                const vFilter = layerBlobs.length === 2 ? "[0:v][1:v]hstack=inputs=2[v]" : `${vInputs}xstack=inputs=${layerBlobs.length}:layout=0_0|w0_0|0_h0|w0_h0[v]`;
                await ffmpeg.run(...layerBlobs.flatMap((_,i)=>['-i',`i${i}`]), '-filter_complex', `${aFilter}${aLabels}amix=inputs=${layerBlobs.length}[a];${vFilter}`, '-map', '[v]', '-map', '[a]', '-c:v', 'libx264', '-preset', 'ultrafast', 'out.mp4');
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([ffmpeg.FS('readFile', 'out.mp4').buffer], {type:'video/mp4'}));
                link.download = `guitar_colab.mp4`; link.click();
            } catch (e) { console.error(e); alert("Erro na mixagem."); }
            btnMix.innerText = "Mixar Camadas (MP4)"; btnMix.disabled = false;
        };
    </script>
</body>
</html>
